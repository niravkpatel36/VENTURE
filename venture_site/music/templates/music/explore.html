<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sargam: Explore Genres</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');


    :root {
      font-size: 16px;
    }

  
    html,body{
      height:100%;
      margin:0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      padding: 2rem;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

  
    h1 {
  font-size: 2.5rem;
  line-height: 1.05;
  margin: 0 0 2.5rem 0;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}


    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.56rem;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .genre {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.3s ease;
      cursor: pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 72px;
    }

    .genre:hover {
      transform: translateY(-6px);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .genre a {
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      display:block;
      width:100%;
    }

    .back-home {
      margin-top: 2.5rem;
      display: inline-block;
      padding: 0.625rem 1.125rem;
      background: #0884a6;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: all 0.2s ease;
      font-size: 1rem;
    }
    .back-home:hover { background: #0072ff; transform: scale(1.05); }

    #background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    @media (max-width: 1024px) {
      :root { font-size: 15px; } 
      h1 { font-size: 2.2rem; }
      .grid { gap: 1.2rem; }
    }

    @media (max-width: 768px) {
      :root { font-size: 14px; }
      body { padding: 1.25rem; }
      h1 { font-size: 1.9rem; margin-bottom: 1.25rem; }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.9rem;
        max-width: 720px;
      }
      .genre { padding: 0.9rem; min-height:64px; }
      .genre a { font-size: 1rem; } 
      .back-home { font-size: 0.95rem; padding: 0.5rem 0.9rem; }
    }

    @media (max-width: 480px) {
      :root { font-size: 13px; } 
      body { padding: 0.9rem; }
      h1 { font-size: 1.6rem; margin-bottom: 1rem; }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.6rem;
        max-width: 520px;
      }
      .genre { padding: 0.7rem; min-height:56px; border-radius:10px; }
      .genre a { font-size: 0.95rem; text-align:center; }
      .back-home {
        width: 86%;
        display: block;
        margin: 1.6rem auto 0;
        font-size: 0.95rem;
        text-align:center;
      }
    }

    body h1, body .genre a, body .back-home {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

  </style>
</head>
<body>
  <h1>Explore Genres</h1>

  <div class="grid">
    {% for g in categories %}
      <div class="genre">
        <a href="/explore/{{ g.id }}/">{{ g.name }}</a>
      </div>
    {% endfor %}
  </div>

  <a href="/" class="back-home">← Back to Home</a>

  <canvas id="background"></canvas>

<script>
const canvas = document.getElementById('background');
const ctx = canvas.getContext('2d');
canvas.style.position = 'fixed';
canvas.style.top = 0;
canvas.style.left = 0;
canvas.style.zIndex = '-1';
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = Array.from({ length: 80 }).map(() => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.8 + 0.4,
  dx: (Math.random() - 0.5) * 0.3,
  dy: (Math.random() - 0.5) * 0.3,
}));

function animate() {
  ctx.fillStyle = 'rgba(15, 10, 25, 0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(160, 130, 255, 0.7)';
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    s.x += s.dx;
    s.y += s.dy;
    if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
    if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
